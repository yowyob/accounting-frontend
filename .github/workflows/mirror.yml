name: Mirror from source
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-push]
concurrency:
  group: mirror-accounting-frontend
  cancel-in-progress: true
jobs:
  mirror:
    if: github.repository == 'yowyob/accounting-frontend'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      UPSTREAM: https://github.com/Delmat237/Yowyob-ERP-Accounting.git
      UPSTREAM_BRANCH: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Synchroniser depuis l'upstream (en préservant .github/)
        env:
          # PAT utilisateur : un push par GITHUB_TOKEN ne déclenche PAS docker-publish.
          MIRROR_PUSH_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}
        run: |
          git config user.name "yowyob-mirror"
          git config user.email "mirror@yowyob.local"
          git remote add upstream "$UPSTREAM"
          git fetch --quiet upstream "$UPSTREAM_BRANCH"
          git checkout upstream/"$UPSTREAM_BRANCH" -- . ':!.github'
          if git diff --cached --quiet; then echo "Aucun changement."; exit 0; fi
          git commit -m "mirror: sync depuis Delmat237/Yowyob-ERP-Accounting@${UPSTREAM_BRANCH}"
          git push "https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
